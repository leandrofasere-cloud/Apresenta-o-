<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leandro Valente | Professor de História e Geografia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: #fff;
            padding: 40px 20px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(220, 38, 38, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
                        0 0 100px rgba(220, 38, 38, 0.1);
            animation: cardEntry 1s ease-out;
            margin: auto;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .photo-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px auto;
            width: 240px;
            height: 240px;
        }

        .photo-container img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            border: 4px solid rgba(220, 38, 38, 0.8);
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.3),
                        0 0 80px rgba(220, 38, 38, 0.1);
            transition: all 0.4s ease;
            animation: photoPulse 3s ease-in-out infinite;
            display: block;
            margin: 0 auto;
        }

        @keyframes photoPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(220, 38, 38, 0.3), 0 0 80px rgba(220, 38, 38, 0.1); }
            50% { box-shadow: 0 0 60px rgba(220, 38, 38, 0.5), 0 0 120px rgba(220, 38, 38, 0.2); }
        }

        .photo-container img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(220, 38, 38, 0.6), 0 0 120px rgba(220, 38, 38, 0.3);
        }

        .photo-ring {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 2px dashed rgba(220, 38, 38, 0.4);
            animation: ringRotate 20s linear infinite;
            width: 240px;
            height: 240px;
            margin: auto;
        }

        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .photo-ring-2 {
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border-radius: 50%;
            border: 1px dashed rgba(220, 38, 38, 0.2);
            animation: ringRotate 30s linear infinite reverse;
            width: 270px;
            height: 270px;
            margin: auto;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, #fca5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .role {
            display: inline-block;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: #fff;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
            animation: roleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes roleGlow {
            from { box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4); }
            to { box-shadow: 0 4px 25px rgba(220, 38, 38, 0.7); }
        }

        .bio {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 35px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .social-btn:hover {
            background: #dc2626;
            border-color: #dc2626;
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.4);
        }

        .contact-btn {
            display: inline-block;
            background: transparent;
            color: #fff;
            padding: 14px 40px;
            border-radius: 50px;
            border: 2px solid rgba(220, 38, 38, 0.6);
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .contact-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(220, 38, 38, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .contact-btn:hover::before {
            left: 100%;
        }

        .contact-btn:hover {
            background: rgba(220, 38, 38, 0.15);
            border-color: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.2);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #fca5a5;
            display: block;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .card { padding: 40px 25px; }
            h1 { font-size: 1.8rem; }
            .photo-container { width: 200px; height: 200px; }
            .photo-container img { width: 180px; height: 180px; }
            .photo-ring { width: 200px; height: 200px; }
            .photo-ring-2 { width: 230px; height: 230px; }
            .stats { gap: 25px; }
            .stat-number { font-size: 1.6rem; }
            .stat-label { font-size: 0.7rem; }
        }
    </style>
</head>
